<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leverancier profiel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #F1F5F9;
        --bg-2: #E2E8F0;
        --card: #FFFFFF;
        --line: #E2E8F0;
        --ink: #0F172A;
        --muted: #64748B;
        --primary: #2563EB;
        --primary-strong: #1D4ED8;
        --ok: #059669;
        --danger: #DC2626;
        --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 16px rgba(15, 23, 42, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg-1);
      }

      .app {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px 14px 26px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--card);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .top-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn {
        border: 0;
        border-radius: 8px;
        padding: 9px 16px;
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        color: #fff;
        background: var(--primary);
        transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      }

      .btn:hover {
        background: var(--primary-strong);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn.ghost {
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--ink);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }

      .btn.ghost:hover {
        background: var(--bg-1);
        border-color: #94A3B8;
        box-shadow: none;
      }

      .hero {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 12px;
      }

      .photo {
        width: 100%;
        border-radius: 10px;
        object-fit: cover;
        height: 100%;
        max-height: 340px;
        background: var(--bg-2);
      }

      h1 {
        margin: 0;
        font-family: "Inter", sans-serif; font-weight: 700; letter-spacing: -0.02em;
        font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      }

      .meta {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .desc {
        margin-top: 12px;
      }

      .chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 0.8rem;
        font-weight: 500;
        background: var(--bg-1);
        color: var(--muted);
      }

      .card {
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        background: var(--card);
      }

      .row {
        display: grid;
        gap: 8px;
      }

      .row.two {
        grid-template-columns: 1fr 1fr;
      }

      label {
        display: block;
        color: var(--muted);
        margin-bottom: 5px;
        font-size: 0.83rem;
      }

      select,
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 0.9rem;
        padding: 9px 11px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .feedback {
        margin-top: 8px;
        min-height: 20px;
      }

      .feedback.ok {
        color: var(--ok);
      }

      .feedback.error {
        color: var(--danger);
      }

      @media (max-width: 900px) {
        .hero,
        .row.two {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="top">
          <a class="btn ghost" href="/suppliers">Terug naar leveranciers</a>
          <div class="top-actions">
            <a class="btn ghost" href="/">Dashboard</a>
            <button id="btn-nav-logout" class="btn ghost" type="button">Uitloggen</button>
          </div>
        </div>

        <section id="supplier-content" class="hero"></section>

        <section id="invite-supplier-card" class="card">
          <h2 style="margin: 0 0 6px; font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: -0.02em">Toevoegen aan je bruiloft</h2>
          <div class="row" style="margin-top: 8px">
            <button id="btn-add-supplier" class="btn" type="button">Toevoegen aan bruiloft</button>
          </div>
          <p id="feedback" class="feedback"></p>
        </section>
      </section>
    </main>

    <script>
      const SESSION_STORAGE_KEY = "managementapp.session";
      let activeSupplier = null;
      let activeWeddingId = "";

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function starsForRating(rating) {
        const filled = Math.max(1, Math.min(5, Math.round(Number(rating || 0))));
        return `${"★".repeat(filled)}${"☆".repeat(5 - filled)}`;
      }

      function defaultSupplierPhoto() {
        return "https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1200&q=80";
      }

      function getSessionProfile() {
        const fallback = {
          userId: "owner-user-1",
          orgId: "org-1",
          role: "owner",
          platformAdmin: false,
        };
        try {
          const raw = localStorage.getItem(SESSION_STORAGE_KEY);
          if (!raw) return fallback;
          const parsed = JSON.parse(raw);
          if (!parsed?.profile) return fallback;
          return {
            userId: parsed.profile.userId || fallback.userId,
            orgId: parsed.profile.orgId || fallback.orgId,
            role: parsed.profile.role || fallback.role,
            platformAdmin: Boolean(parsed.profile.platformAdmin),
          };
        } catch {
          return fallback;
        }
      }

      function apiHeaders(withJson = false) {
        const profile = getSessionProfile();
        const headers = {
          "x-user-id": profile.userId,
          "x-supplier-org-id": profile.orgId,
          "x-user-role": profile.role,
        };
        if (withJson) headers["Content-Type"] = "application/json";
        if (profile.platformAdmin) headers["x-platform-admin"] = "true";
        return headers;
      }

      function getStoredSession() {
        try {
          const raw = localStorage.getItem(SESSION_STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      async function logoutToLogin() {
        const refreshToken = getStoredSession()?.tokens?.refreshToken;
        if (refreshToken) {
          await fetch("/v1/auth/logout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refreshToken }),
          }).catch(() => null);
        }
        localStorage.removeItem(SESSION_STORAGE_KEY);
        window.location.href = "/";
      }

      function supplierIdFromPath() {
        const parts = window.location.pathname.split("/").filter(Boolean);
        if (parts[0] === "suppliers" && parts[1]) {
          return decodeURIComponent(parts[1]);
        }
        return "";
      }

      function setFeedback(message, isError = false) {
        const node = document.getElementById("feedback");
        node.textContent = message;
        node.classList.toggle("ok", Boolean(message) && !isError);
        node.classList.toggle("error", Boolean(message) && isError);
      }

      async function loadSupplier() {
        const supplierId = supplierIdFromPath();
        if (!supplierId) {
          document.getElementById("supplier-content").innerHTML = `<p>Geen leverancier geselecteerd.</p>`;
          return;
        }

        const response = await fetch(`/v1/suppliers/${encodeURIComponent(supplierId)}`, {
          headers: apiHeaders(false),
        });
        if (!response.ok) {
          document.getElementById("supplier-content").innerHTML = `<p>Leverancier niet gevonden.</p>`;
          return;
        }

        const payload = await response.json();
        activeSupplier = payload.supplier || null;
        if (!activeSupplier) {
          document.getElementById("supplier-content").innerHTML = `<p>Leverancier niet gevonden.</p>`;
          return;
        }

        const services = Array.isArray(activeSupplier.services) ? activeSupplier.services : [];
        const contactRows = [
          activeSupplier.email ? `<p class="meta">E-mail: ${escapeHtml(activeSupplier.email)}</p>` : "",
          activeSupplier.website ? `<p class="meta">Website: ${escapeHtml(activeSupplier.website)}</p>` : "",
          activeSupplier.instagram ? `<p class="meta">Instagram: ${escapeHtml(activeSupplier.instagram)}</p>` : "",
          activeSupplier.tiktok ? `<p class="meta">TikTok: ${escapeHtml(activeSupplier.tiktok)}</p>` : "",
        ]
          .filter(Boolean)
          .join("");
        const descriptionLine = String(activeSupplier.description || "").trim()
          ? `<p class="desc">${escapeHtml(activeSupplier.description)}</p>`
          : "";
        const photoUrl = String(activeSupplier.photoUrl || "").trim() || defaultSupplierPhoto();
        document.getElementById("supplier-content").innerHTML = `
          <img class="photo" src="${escapeHtml(photoUrl)}" alt="${escapeHtml(activeSupplier.name)}" />
          <div>
            <h1>${escapeHtml(activeSupplier.name)}</h1>
            <p class="meta">${escapeHtml(activeSupplier.location)} · ${escapeHtml(activeSupplier.category)}</p>
            <p class="meta">Budget: ${escapeHtml(activeSupplier.budgetTier)}</p>
            <p class="meta">${starsForRating(activeSupplier.rating)} · ${Number(activeSupplier.rating || 0).toFixed(1)} (${Number(
          activeSupplier.reviewsCount || 0
        )} reviews)</p>
            ${contactRows}
            ${descriptionLine}
            <div class="chips">
              ${services.map((service) => `<span class="chip">${escapeHtml(service)}</span>`).join("")}
            </div>
          </div>
        `;
      }

      async function loadActiveWedding() {
        const profile = getSessionProfile();
        const addButton = document.getElementById("btn-add-supplier");
        const inviteCard = document.getElementById("invite-supplier-card");

        if (profile.role !== "owner") {
          activeWeddingId = "";
          addButton.disabled = true;
          if (inviteCard) inviteCard.hidden = true;
          setFeedback("");
          return;
        }
        if (inviteCard) inviteCard.hidden = false;

        const response = await fetch("/v1/weddings", {
          headers: apiHeaders(false),
        });
        if (!response.ok) {
          activeWeddingId = "";
          addButton.disabled = true;
          setFeedback("Kon je bruiloft niet laden.", true);
          return;
        }
        const payload = await response.json();
        const weddings = Array.isArray(payload.weddings) ? payload.weddings : [];
        if (!weddings.length) {
          activeWeddingId = "";
          addButton.disabled = true;
          setFeedback("Nog geen bruiloft gevonden. Maak eerst je bruiloft aan in het dashboard.", true);
          return;
        }

        const storedSession = getStoredSession();
        const preferredWeddingId = String(storedSession?.selectedWeddingId || "");
        const selectedWedding = weddings.find((wedding) => wedding.id === preferredWeddingId) || weddings[0];
        activeWeddingId = selectedWedding.id;
        addButton.disabled = false;
        setFeedback("");
      }

      async function addSupplierToWedding() {
        setFeedback("");
        if (!activeSupplier) {
          setFeedback("Leverancier kon niet worden geladen.", true);
          return;
        }
        const profile = getSessionProfile();
        if (profile.role !== "owner") {
          setFeedback("Alleen bruidspaar kan leveranciers toevoegen.", true);
          return;
        }
        if (!activeWeddingId) {
          setFeedback("Geen actieve bruiloft gevonden.", true);
          return;
        }

        const response = await fetch(`/v1/weddings/${encodeURIComponent(activeWeddingId)}/suppliers/invite`, {
          method: "POST",
          headers: apiHeaders(true),
          body: JSON.stringify({
            email: activeSupplier.email,
            type: "wedding_supplier_invite",
            supplier_org_id: activeSupplier.supplierOrgId,
          }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          setFeedback(payload?.error || "Toevoegen mislukt.", true);
          return;
        }
        setFeedback(`Uitnodiging verzonden naar ${activeSupplier.name}.`);
      }

      document.getElementById("btn-add-supplier").addEventListener("click", () => {
        void addSupplierToWedding();
      });
      document.getElementById("btn-nav-logout").addEventListener("click", () => {
        void logoutToLogin();
      });

      void loadSupplier();
      void loadActiveWedding();
    </script>
  </body>
</html>
