<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draaiboek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #F1F5F9;
        --bg-2: #E2E8F0;
        --card: #FFFFFF;
        --ink: #0F172A;
        --muted: #64748B;
        --line: #E2E8F0;
        --accent: #2563EB;
        --accent-soft: #EFF6FF;
        --ok: #059669;
        --danger: #DC2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg-1);
      }

      .app {
        max-width: 1260px;
        margin: 0 auto;
        padding: 16px;
      }

      .top {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--card);
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 16px rgba(15, 23, 42, 0.06);
        padding: 14px 18px;
      }

      .top h1 {
        margin: 0;
        font-family: "Inter", sans-serif; font-weight: 700; letter-spacing: -0.02em;
        font-size: clamp(1.5rem, 3.4vw, 2.2rem);
      }

      .sub {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn,
      .link {
        border-radius: 8px;
        border: 1px solid var(--line);
        padding: 7px 14px;
        background: var(--card);
        color: var(--ink);
        text-decoration: none;
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      }

      .btn:hover,
      .link:hover {
        background: var(--bg-1);
        border-color: #94A3B8;
      }

      .btn.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .btn.primary:hover {
        background: var(--accent-strong, #1D4ED8);
        border-color: var(--accent-strong, #1D4ED8);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }

      .layout {
        margin-top: 12px;
        display: grid;
        gap: 12px;
        grid-template-columns: 360px 1fr;
        align-items: start;
      }

      body.supplier-readonly .layout {
        grid-template-columns: 1fr;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--card);
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
        padding: 14px;
      }

      .card h2 {
        margin: 0 0 8px;
        font-family: "Inter", sans-serif; font-weight: 700; letter-spacing: -0.02em;
        font-size: 1.3rem;
      }

      .row {
        display: grid;
        gap: 8px;
        margin-bottom: 8px;
      }

      .row.two {
        grid-template-columns: 1fr 1fr;
      }

      label {
        display: block;
        margin: 0 0 4px;
        color: var(--muted);
        font-size: 0.8rem;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 0.9rem;
        padding: 8px 11px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      textarea {
        min-height: 80px;
        resize: vertical;
      }

      .feedback {
        min-height: 20px;
        margin-top: 8px;
        font-size: 0.9rem;
      }

      .feedback.ok {
        color: var(--ok);
      }

      .feedback.error {
        color: var(--danger);
      }

      .supplier-summary {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg-1);
        padding: 8px;
        font-size: 0.875rem;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .supplier-chip {
        border-radius: 6px;
        border: 1px solid var(--line);
        background: var(--card);
        padding: 2px 8px;
        font-size: 0.775rem;
        font-weight: 500;
        color: var(--muted);
      }

      .btn.danger {
        border-color: #FCA5A5;
        color: var(--danger);
        background: #FEF2F2;
      }

      .btn.danger:hover {
        background: #FEE2E2;
        border-color: var(--danger);
        box-shadow: none;
      }

      .day-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .day-title {
        font-weight: 700;
      }

      .timeline-wrap {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card);
        overflow: auto;
        max-height: 74vh;
      }

      .timeline {
        position: relative;
        min-height: 1730px;
      }

      .tick {
        position: absolute;
        left: 0;
        right: 0;
        border-top: 1px solid #F1F5F9;
      }

      .tick.hour {
        border-top-color: #CBD5E1;
      }

      .tick-label {
        position: absolute;
        left: 10px;
        transform: translateY(-50%);
        font-size: 0.72rem;
        color: var(--muted);
        background: var(--card);
        padding: 0 4px;
      }

      .items-layer {
        position: absolute;
        left: 72px;
        right: 10px;
        top: 0;
        bottom: 0;
      }

      .item {
        position: absolute;
        left: 0;
        width: 100%;
        border: 1px solid #93C5FD;
        border-left: 4px solid var(--accent);
        border-radius: 8px;
        background: var(--accent-soft);
        padding: 6px 8px;
        overflow: hidden;
        transition: box-shadow 0.15s ease;
      }

      .item:hover {
        box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
      }

      .item.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.25);
      }

      .item strong {
        display: block;
        font-size: 0.86rem;
        color: var(--ink);
      }

      .item span {
        display: block;
        font-size: 0.76rem;
        color: var(--muted);
      }

      .day-list {
        margin-top: 10px;
        display: grid;
        gap: 6px;
      }

      .day-row {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg-1);
        padding: 8px 10px;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease;
      }

      .day-row:hover {
        background: var(--bg-2);
        border-color: #94A3B8;
      }

      .day-row.selected {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .muted {
        color: var(--muted);
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(4px);
        display: grid;
        place-items: center;
        padding: 16px;
        z-index: 30;
      }

      .modal[hidden] {
        display: none;
      }

      .modal-card {
        width: min(620px, 100%);
        max-height: 80vh;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--card);
        box-shadow: 0 24px 48px rgba(15, 23, 42, 0.16);
        padding: 20px;
      }

      .modal-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .modal-head h3 {
        margin: 0;
        font-family: "Inter", sans-serif; font-weight: 700; letter-spacing: -0.02em;
      }

      .supplier-list {
        margin-top: 8px;
        display: grid;
        gap: 6px;
      }

      .supplier-row {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        padding: 10px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        transition: background 0.12s ease;
      }

      .supplier-row:hover {
        background: var(--bg-1);
      }

      .supplier-row button {
        min-width: 42px;
      }

      .supplier-row button.remove {
        border-color: #FCA5A5;
        color: var(--danger);
        background: #FEF2F2;
      }

      .supplier-row button.remove:hover {
        background: #FEE2E2;
        border-color: var(--danger);
      }

      .supplier-row button.success {
        border-color: #6EE7B7;
        color: var(--ok);
        background: #ECFDF5;
      }

      .modal-actions {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .documents-section {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }

      .documents-section h3 {
        margin: 0 0 8px;
        font-family: "Inter", sans-serif; font-weight: 700; letter-spacing: -0.02em;
        font-size: 1.1rem;
      }

      .documents-list {
        display: grid;
        gap: 6px;
      }

      .document-row {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg-1);
        padding: 8px 10px;
      }

      .document-row strong {
        display: block;
      }

      .document-row .meta {
        color: var(--muted);
        font-size: 0.82rem;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      .chat-panel {
        margin-top: 12px;
      }

      .chat-panel h3 {
        margin: 0 0 10px;
        font-family: "Inter", sans-serif; font-weight: 700; letter-spacing: -0.02em;
        font-size: 1.2rem;
      }

      .chat-msgs {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 340px;
        overflow-y: auto;
        padding: 10px;
        background: var(--bg-1);
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .chat-msg {
        display: flex;
        flex-direction: column;
        max-width: 78%;
        gap: 2px;
      }

      .chat-msg.out {
        align-self: flex-end;
        align-items: flex-end;
      }

      .chat-msg.in {
        align-self: flex-start;
        align-items: flex-start;
      }

      .chat-bubble {
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 0.9rem;
        line-height: 1.4;
        word-break: break-word;
      }

      .chat-msg.out .chat-bubble {
        background: var(--accent);
        color: #fff;
      }

      .chat-msg.in .chat-bubble {
        background: var(--card);
        border: 1px solid var(--line);
        color: var(--ink);
        box-shadow: 0 1px 4px rgba(15, 23, 42, 0.06);
      }

      .chat-ts {
        font-size: 0.72rem;
        color: var(--muted);
      }

      .chat-empty {
        text-align: center;
        color: var(--muted);
        font-size: 0.9rem;
        padding: 20px;
      }

      .chat-compose {
        display: flex;
        gap: 8px;
      }

      .chat-compose input {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="top">
        <div>
          <h1>Draaiboek</h1>
          <p id="page-subtitle" class="sub">Laad je bruiloft...</p>
        </div>
        <div class="actions" id="nav-actions">
          <a class="link owner-only" href="/profile">Profiel</a>
          <a class="link owner-only" href="/suppliers">Leveranciers</a>
          <a class="link owner-only" href="/">Dashboard</a>
          <a class="link supplier-only" href="/" style="display:none">Mijn bruiloften</a>
          <button id="btn-nav-logout" class="btn" type="button">Uitloggen</button>
        </div>
      </section>

      <section class="layout">
        <article id="editor-card" class="card">
          <h2 id="form-title">Nieuw item</h2>
          <div class="row two">
            <div>
              <label for="item-date">Datum</label>
              <input id="item-date" type="date" />
            </div>
            <div>
              <label>Leveranciers</label>
              <div id="supplier-summary" class="supplier-summary">
                <span class="muted">Geen leveranciers gekoppeld.</span>
              </div>
              <button id="btn-open-supplier-modal" class="btn" type="button" style="margin-top: 6px">Leveranciers toevoegen</button>
            </div>
          </div>
          <div class="row two">
            <div>
              <label for="item-start">Van</label>
              <input id="item-start" type="time" value="09:00" />
            </div>
            <div>
              <label for="item-end">Tot</label>
              <input id="item-end" type="time" value="09:30" />
            </div>
          </div>
          <div class="row">
            <div>
              <label for="item-title">Wat</label>
              <input id="item-title" placeholder="Bijv. Ceremonie opbouw" />
            </div>
          </div>
          <div class="row">
            <div>
              <label for="item-location">Waar</label>
              <input id="item-location" placeholder="Bijv. Grote zaal" />
            </div>
          </div>
          <div class="row">
            <div>
              <label for="item-notes">Notitie</label>
              <textarea id="item-notes" placeholder="Extra instructies"></textarea>
            </div>
          </div>
          <div class="row two">
            <button id="btn-save-item" class="btn primary" type="button">Opslaan</button>
            <button id="btn-cancel-edit" class="btn" type="button" hidden>Annuleer bewerken</button>
          </div>
          <button id="btn-delete-item" class="btn danger" type="button" hidden>Activiteit verwijderen</button>
          <p id="feedback" class="feedback"></p>
        </article>

        <article class="card">
          <p id="readonly-feedback" class="sub" hidden>Alleen gekoppelde draaiboekitems zijn zichtbaar voor leveranciers.</p>
          <div class="day-nav">
            <button id="btn-prev-day" class="btn" type="button">← Vorige dag</button>
            <div id="day-title" class="day-title">-</div>
            <button id="btn-next-day" class="btn" type="button">Volgende dag →</button>
          </div>
          <div class="timeline-wrap">
            <div id="timeline" class="timeline">
              <div id="timeline-items" class="items-layer"></div>
            </div>
          </div>
          <div id="day-list" class="day-list"></div>
          <section class="documents-section">
            <h3>Documenten</h3>
            <div id="documents-list" class="documents-list">
              <div class="muted">Nog geen documenten zichtbaar.</div>
            </div>
          </section>
        </article>
      </section>

      <section id="chat-panel" class="card chat-panel" hidden>
        <h3>Berichten met het bruidspaar</h3>
        <div id="chat-msgs" class="chat-msgs">
          <div class="chat-empty">Laden...</div>
        </div>
        <form id="chat-form" class="chat-compose">
          <input id="chat-input" type="text" placeholder="Typ een bericht..." autocomplete="off" maxlength="10000" />
          <button class="btn primary" type="submit">Verstuur</button>
        </form>
      </section>
    </main>
    <section id="supplier-modal" class="modal" hidden>
      <article class="modal-card">
        <div class="modal-head">
          <h3>Leveranciers koppelen</h3>
          <button id="btn-close-supplier-modal" class="btn" type="button">Sluiten</button>
        </div>
        <div id="supplier-modal-list" class="supplier-list"></div>
        <div class="modal-actions">
          <button id="btn-save-supplier-modal" class="btn primary" type="button">Opslaan</button>
        </div>
      </article>
    </section>

    <script>
      const SESSION_STORAGE_KEY = "managementapp.session";
      const PX_PER_MINUTE = 1.2;
      const state = {
        wedding: null,
        currentDate: "",
        items: [],
        documents: [],
        suppliers: [],
        editingItemId: "",
        formSupplierOrgIds: [],
        modalSupplierOrgIds: [],
        modalFlashSupplierOrgIds: [],
      };
      const supplierFlashTimers = new Map();

      function getSession() {
        try {
          const raw = localStorage.getItem(SESSION_STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function getProfile() {
        const fallback = {
          userId: "owner-user-1",
          orgId: "org-1",
          role: "owner",
          platformAdmin: false,
        };
        const profile = getSession()?.profile;
        if (!profile) return fallback;
        return {
          userId: profile.userId || fallback.userId,
          orgId: profile.orgId || fallback.orgId,
          role: profile.role || fallback.role,
          platformAdmin: Boolean(profile.platformAdmin),
        };
      }

      function isOwnerMode() {
        return String(getProfile().role || "").toLowerCase() === "owner";
      }

      function requestedWeddingId() {
        return String(new URLSearchParams(window.location.search).get("weddingId") || "").trim();
      }

      function headers(withJson = false) {
        const profile = getProfile();
        const out = {
          "x-user-id": profile.userId,
          "x-supplier-org-id": profile.orgId,
          "x-user-role": profile.role,
        };
        if (withJson) out["Content-Type"] = "application/json";
        if (profile.platformAdmin) out["x-platform-admin"] = "true";
        return out;
      }

      async function logoutToLogin() {
        const refreshToken = getSession()?.tokens?.refreshToken;
        if (refreshToken) {
          await fetch("/v1/auth/logout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refreshToken }),
          }).catch(() => null);
        }
        localStorage.removeItem(SESSION_STORAGE_KEY);
        window.location.href = "/";
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function setFeedback(message, error = false) {
        const node = document.getElementById("feedback");
        node.textContent = message;
        node.classList.toggle("ok", Boolean(message) && !error);
        node.classList.toggle("error", Boolean(message) && error);
      }

      function pad(number) {
        return String(number).padStart(2, "0");
      }

      function formatDateLong(dateStr) {
        const date = new Date(`${dateStr}T00:00:00`);
        return new Intl.DateTimeFormat("nl-NL", {
          weekday: "long",
          day: "2-digit",
          month: "long",
          year: "numeric",
        }).format(date);
      }

      function toLocalDate(isoString) {
        const date = new Date(isoString);
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
      }

      function toLocalTime(isoString) {
        const date = new Date(isoString);
        return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function combineLocalDateTime(dateStr, timeStr) {
        return new Date(`${dateStr}T${timeStr}:00`).toISOString();
      }

      function minutesFromMidnight(isoString) {
        const date = new Date(isoString);
        return date.getHours() * 60 + date.getMinutes();
      }

      function shiftDate(dateStr, days) {
        const date = new Date(`${dateStr}T00:00:00`);
        date.setDate(date.getDate() + days);
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
      }

      function timelineItemsForCurrentDay() {
        return state.items
          .filter((item) => toLocalDate(item.start_at) === state.currentDate)
          .sort((a, b) => new Date(a.start_at).getTime() - new Date(b.start_at).getTime());
      }

      function supplierIdsForItem(item) {
        if (Array.isArray(item?.owner_supplier_org_ids) && item.owner_supplier_org_ids.length > 0) {
          return item.owner_supplier_org_ids.map((id) => String(id || "").trim()).filter(Boolean);
        }
        if (item?.owner_supplier_org_id) {
          return [String(item.owner_supplier_org_id).trim()].filter(Boolean);
        }
        return [];
      }

      function supplierNamesForItem(item) {
        const ids = supplierIdsForItem(item);
        if (!ids.length) return "Zonder leverancier";
        const names = ids
          .map((id) => state.suppliers.find((supplier) => supplier.orgId === id)?.name || id)
          .filter(Boolean);
        return names.length ? names.join(", ") : "Zonder leverancier";
      }

      function overlaps(a, b) {
        const aStart = minutesFromMidnight(a.start_at);
        const aEnd = Math.max(aStart + 10, minutesFromMidnight(a.end_at));
        const bStart = minutesFromMidnight(b.start_at);
        const bEnd = Math.max(bStart + 10, minutesFromMidnight(b.end_at));
        return aStart < bEnd && aEnd > bStart;
      }

      function buildTimelineLayout(dayItems) {
        const withLane = dayItems.map((item) => ({ ...item, lane: 0 }));
        const laneEnds = [];
        withLane.forEach((item) => {
          const start = minutesFromMidnight(item.start_at);
          const end = Math.max(start + 10, minutesFromMidnight(item.end_at));
          let lane = laneEnds.findIndex((laneEnd) => laneEnd <= start);
          if (lane === -1) {
            lane = laneEnds.length;
            laneEnds.push(end);
          } else {
            laneEnds[lane] = end;
          }
          item.lane = lane;
        });

        const adjacency = withLane.map(() => []);
        for (let i = 0; i < withLane.length; i += 1) {
          for (let j = i + 1; j < withLane.length; j += 1) {
            if (!overlaps(withLane[i], withLane[j])) continue;
            adjacency[i].push(j);
            adjacency[j].push(i);
          }
        }

        const visited = new Array(withLane.length).fill(false);
        const laneCountByIndex = new Array(withLane.length).fill(1);

        for (let i = 0; i < withLane.length; i += 1) {
          if (visited[i]) continue;
          const stack = [i];
          const component = [];
          visited[i] = true;
          while (stack.length) {
            const current = stack.pop();
            component.push(current);
            adjacency[current].forEach((next) => {
              if (visited[next]) return;
              visited[next] = true;
              stack.push(next);
            });
          }
          const laneCount = Math.max(...component.map((idx) => withLane[idx].lane)) + 1;
          component.forEach((idx) => {
            laneCountByIndex[idx] = laneCount;
          });
        }

        return withLane.map((item, index) => ({
          ...item,
          laneCount: laneCountByIndex[index],
        }));
      }

      function uniqueIds(values) {
        return Array.from(new Set((values || []).map((value) => String(value || "").trim()).filter(Boolean)));
      }

      function clearSupplierFlash(supplierOrgId) {
        const timer = supplierFlashTimers.get(supplierOrgId);
        if (timer) {
          clearTimeout(timer);
          supplierFlashTimers.delete(supplierOrgId);
        }
        state.modalFlashSupplierOrgIds = state.modalFlashSupplierOrgIds.filter((id) => id !== supplierOrgId);
      }

      function clearAllSupplierFlash() {
        supplierFlashTimers.forEach((timer) => clearTimeout(timer));
        supplierFlashTimers.clear();
        state.modalFlashSupplierOrgIds = [];
      }

      function markSupplierAddedFlash(supplierOrgId) {
        clearSupplierFlash(supplierOrgId);
        state.modalFlashSupplierOrgIds = uniqueIds([...state.modalFlashSupplierOrgIds, supplierOrgId]);
        const timer = setTimeout(() => {
          state.modalFlashSupplierOrgIds = state.modalFlashSupplierOrgIds.filter((id) => id !== supplierOrgId);
          supplierFlashTimers.delete(supplierOrgId);
          const modal = document.getElementById("supplier-modal");
          if (modal && !modal.hidden) renderSupplierModalList();
        }, 2000);
        supplierFlashTimers.set(supplierOrgId, timer);
      }

      function renderSupplierSummary() {
        const node = document.getElementById("supplier-summary");
        const names = state.formSupplierOrgIds
          .map((id) => state.suppliers.find((supplier) => supplier.orgId === id)?.name || id)
          .filter(Boolean);
        if (!names.length) {
          node.innerHTML = `<span class="muted">Geen leveranciers gekoppeld.</span>`;
          return;
        }
        node.innerHTML = names.map((name) => `<span class="supplier-chip">${escapeHtml(name)}</span>`).join("");
      }

      function renderSupplierModalList() {
        const node = document.getElementById("supplier-modal-list");
        if (!state.suppliers.length) {
          node.innerHTML = `<div class="muted">Nog geen leveranciers toegevoegd aan deze bruiloft.</div>`;
          return;
        }
        node.innerHTML = state.suppliers
          .map((supplier) => {
            const selected = state.modalSupplierOrgIds.includes(supplier.orgId);
            const flashing = state.modalFlashSupplierOrgIds.includes(supplier.orgId);
            const action = flashing ? "success" : selected ? "remove" : "add";
            const label = flashing ? "✓" : selected ? "✕" : "✓";
            return `
              <div class="supplier-row">
                <div>
                  <strong>${escapeHtml(supplier.name)}</strong>
                  <div class="muted">${escapeHtml(supplier.status || "")}</div>
                </div>
                <button
                  class="btn ${action === "remove" ? "remove" : ""} ${action === "success" ? "success" : ""}"
                  type="button"
                  data-toggle-supplier="${escapeHtml(supplier.orgId)}"
                  title="${action === "remove" ? "Verwijderen uit activiteit" : "Toevoegen aan activiteit"}"
                >${label}</button>
              </div>
            `;
          })
          .join("");

        node.querySelectorAll("[data-toggle-supplier]").forEach((button) => {
          button.addEventListener("click", () => {
            const supplierOrgId = button.getAttribute("data-toggle-supplier") || "";
            if (!supplierOrgId) return;
            if (state.modalSupplierOrgIds.includes(supplierOrgId)) {
              state.modalSupplierOrgIds = state.modalSupplierOrgIds.filter((id) => id !== supplierOrgId);
              clearSupplierFlash(supplierOrgId);
            } else {
              state.modalSupplierOrgIds = uniqueIds([...state.modalSupplierOrgIds, supplierOrgId]);
              markSupplierAddedFlash(supplierOrgId);
            }
            renderSupplierModalList();
          });
        });

      function renderDay() {
        document.getElementById("day-title").textContent = formatDateLong(state.currentDate);
        document.getElementById("item-date").value = state.currentDate;

        const timeline = document.getElementById("timeline");
        const itemsLayer = document.getElementById("timeline-items");
        timeline.querySelectorAll(".tick, .tick-label").forEach((node) => node.remove());

        for (let minute = 0; minute <= 1439; minute += 10) {
          const top = minute * PX_PER_MINUTE;
          const tick = document.createElement("div");
          tick.className = `tick ${minute % 60 === 0 ? "hour" : ""}`;
          tick.style.top = `${top}px`;
          timeline.appendChild(tick);

          if (minute % 60 === 0) {
            const label = document.createElement("div");
            label.className = "tick-label";
            label.style.top = `${top}px`;
            label.textContent = `${pad(Math.floor(minute / 60))}:00`;
            timeline.appendChild(label);
          }
        }

        const dayItems = timelineItemsForCurrentDay();
        const layoutItems = buildTimelineLayout(dayItems);
        const canEdit = isOwnerMode();
        itemsLayer.innerHTML = layoutItems
          .map((item) => {
            const start = minutesFromMidnight(item.start_at);
            const end = Math.max(start + 10, minutesFromMidnight(item.end_at));
            const top = start * PX_PER_MINUTE;
            const height = Math.max(18, (end - start) * PX_PER_MINUTE);
            const who = supplierNamesForItem(item);
            const laneCount = Math.max(1, Number(item.laneCount || 1));
            const lane = Math.max(0, Number(item.lane || 0));
            const widthPct = 100 / laneCount;
            const leftPct = lane * widthPct;
            const isSelected = state.editingItemId === item.id ? "selected" : "";
            return `
              <article class="item ${isSelected}" ${canEdit ? `data-edit-item="${escapeHtml(item.id)}"` : ""} style="top:${top}px;height:${height}px;left:${leftPct}%;width:calc(${widthPct}% - 6px);">
                <strong>${escapeHtml(item.title || "Item")}</strong>
                <span>${escapeHtml(toLocalTime(item.start_at))} - ${escapeHtml(toLocalTime(item.end_at))}</span>
                <span>${escapeHtml(who)} · ${escapeHtml(item.location || "Locatie onbekend")}</span>
              </article>
            `;
          })
          .join("");

        const list = document.getElementById("day-list");
        if (!dayItems.length) {
          list.innerHTML = `<div class="muted">Nog geen items voor deze dag.</div>`;
          return;
        }
        list.innerHTML = dayItems
          .map((item) => {
            const who = supplierNamesForItem(item);
            const isSelected = state.editingItemId === item.id ? "selected" : "";
            return `
              <div class="day-row ${isSelected}" ${canEdit ? `data-edit-item="${escapeHtml(item.id)}"` : ""}>
                <strong>${escapeHtml(toLocalTime(item.start_at))} - ${escapeHtml(toLocalTime(item.end_at))}</strong>
                <div>${escapeHtml(item.title || "Item")}</div>
                <div class="muted">${escapeHtml(who)} · ${escapeHtml(item.location || "Locatie onbekend")}</div>
              </div>
            `;
          })
          .join("");

        if (canEdit) {
          document.querySelectorAll("[data-edit-item]").forEach((node) => {
            node.addEventListener("click", () => {
              const itemId = node.getAttribute("data-edit-item") || "";
              if (!itemId) return;
              startEditingItem(itemId);
            });
          });
        }
      }

      async function loadWeddingContext() {
        const profile = getProfile();
        const role = String(profile.role || "").toLowerCase();
        if (role !== "owner" && role !== "supplier") {
          document.getElementById("page-subtitle").textContent = "Log in om een bruiloft te openen.";
          setFeedback("Deze pagina is alleen beschikbaar voor bruidspaar of leverancier.", true);
          return false;
        }

        const response = await fetch("/v1/weddings", { headers: headers(false) });
        if (!response.ok) {
          document.getElementById("page-subtitle").textContent = "Kon je bruiloft niet laden.";
          setFeedback("Kon je bruiloft niet laden.", true);
          return false;
        }

        const payload = await response.json();
        const weddings = Array.isArray(payload.weddings) ? payload.weddings : [];
        if (!weddings.length) {
          document.getElementById("page-subtitle").textContent = "Nog geen bruiloft gevonden.";
          setFeedback("Maak eerst je bruiloft aan in het dashboard.", true);
          return false;
        }

        const preferredId = requestedWeddingId() || String(getSession()?.selectedWeddingId || "");
        state.wedding = weddings.find((wedding) => wedding.id === preferredId) || weddings[0];
        if (!state.wedding && preferredId) {
          state.wedding = {
            id: preferredId,
            title: preferredId,
            wedding_date: "",
          };
        }
        const session = getSession();
        if (session && state.wedding) {
          session.selectedWeddingId = state.wedding.id;
          session.selectedWeddingTitle = state.wedding.title || state.wedding.id;
          localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(session));
        }

        const weddingDate = String(state.wedding.wedding_date || "");
        const defaultDate = weddingDate && weddingDate !== "2099-12-31" ? weddingDate : toLocalDate(new Date().toISOString());
        state.currentDate = defaultDate;

        document.getElementById("page-subtitle").textContent =
          role === "owner"
            ? `${state.wedding.title || "Bruiloft"} · one day view`

      }

      async function loadSuppliers() {
        const [invitesResponse, catalogResponse] = await Promise.all([
          fetch(`/v1/weddings/${encodeURIComponent(state.wedding.id)}/invitations`, {
            headers: headers(false),
          }).catch(() => null),
          fetch(`/v1/suppliers`, {
            headers: headers(false),
          }).catch(() => null),
        ]);
        if (!invitesResponse || !invitesResponse.ok) {
          state.suppliers = [];
          renderSupplierSummary();
          renderSupplierModalList();
          return;
        }

        const payload = await invitesResponse.json().catch(() => ({}));
        const invitations = Array.isArray(payload.invitations) ? payload.invitations : [];
        const catalogPayload = catalogResponse && catalogResponse.ok ? await catalogResponse.json().catch(() => ({})) : {};
        const catalogRows = Array.isArray(catalogPayload?.suppliers) ? catalogPayload.suppliers : [];
        const supplierNameByOrgId = new Map(
          catalogRows
            .filter((supplier) => supplier.supplierOrgId)
            .map((supplier) => [String(supplier.supplierOrgId), String(supplier.name || supplier.email || "Leverancier")])
        );
        const map = new Map();
        invitations
          .filter((invite) => invite.type === "wedding_supplier_invite")
          .filter((invite) => invite.status === "pending" || invite.status === "accepted")
          .forEach((invite) => {
            const key = invite.supplier_org_id;
            if (!key) return;
            if (!map.has(key)) {
              map.set(key, {
                orgId: invite.supplier_org_id,
                name: supplierNameByOrgId.get(invite.supplier_org_id) || invite.target_email || "Leverancier",
                status: invite.status === "accepted" ? "geaccepteerd" : "uitgenodigd",
              });
            }
          });

        state.suppliers = [...map.values()];
        renderSupplierSummary();
        renderSupplierModalList();
      }

      function normalizeItemsForSave() {
        return state.items
          .slice()
          .sort((a, b) => new Date(a.start_at).getTime() - new Date(b.start_at).getTime())
          .map((item, index) => {
            const supplierOrgIds = supplierIdsForItem(item);
            return {
              ...item,
              sort_index: index,
              item_type: item.item_type || "other",
              owner_supplier_org_ids: supplierOrgIds,
              owner_supplier_org_id: supplierOrgIds[0] || null,
              visibility_scope: supplierOrgIds.length ? "selected_suppliers" : "all_published",
            };
          });
      }

      async function saveDraft() {
        if (!isOwnerMode()) {
          setFeedback("Alleen bruidspaar kan wijzigingen opslaan.", true);
          return false;
        }
        const payload = normalizeItemsForSave();
        const response = await fetch(`/v1/weddings/${encodeURIComponent(state.wedding.id)}/ros/draft`, {
          method: "POST",
          headers: headers(true),
          body: JSON.stringify({ draft_json: payload }),
        });
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          setFeedback(data?.error || "Opslaan mislukt.", true);
          return false;
        }
        return true;
      }

      async function saveItem() {
        if (!isOwnerMode()) {
          setFeedback("Alleen bruidspaar kan draaiboekitems aanpassen.", true);
          return;
        }
        setFeedback("");
        const date = document.getElementById("item-date").value;
        const start = document.getElementById("item-start").value;
        const end = document.getElementById("item-end").value;
        const title = document.getElementById("item-title").value.trim();
        const location = document.getElementById("item-location").value.trim();
        const notes = document.getElementById("item-notes").value.trim();
        const supplierOrgIds = uniqueIds(state.formSupplierOrgIds);

        if (!date || !start || !end || !title) {
          setFeedback("Vul datum, tijd en wat in.", true);
          return;
        }
        if (start >= end) {
          setFeedback("Eindtijd moet later zijn dan starttijd.", true);
          return;
        }

        const isEditing = Boolean(state.editingItemId);
        const existingIndex = state.items.findIndex((item) => item.id === state.editingItemId);
        if (isEditing && existingIndex >= 0) {
          const current = state.items[existingIndex];
          state.items[existingIndex] = {
            ...current,
            title,
            start_at: combineLocalDateTime(date, start),
            end_at: combineLocalDateTime(date, end),
            location: location || null,
            instructions: notes,
            owner_role: supplierOrgIds.length ? "supplier" : "owner",
            owner_supplier_org_ids: supplierOrgIds,
            owner_supplier_org_id: supplierOrgIds[0] || null,
            visibility_scope: supplierOrgIds.length ? "selected_suppliers" : "all_published",
          };
        } else {
          state.items.push({
            id: `ros-item-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
            wedding_id: state.wedding.id,
            title,
            start_at: combineLocalDateTime(date, start),
            end_at: combineLocalDateTime(date, end),
            location: location || null,
            instructions: notes,
            private_notes: "",
            owner_role: supplierOrgIds.length ? "supplier" : "owner",
            owner_supplier_org_ids: supplierOrgIds,
            owner_supplier_org_id: supplierOrgIds[0] || null,
            item_type: "other",
            visibility_scope: supplierOrgIds.length ? "selected_suppliers" : "all_published",
            created_at: new Date().toISOString(),
            sort_index: state.items.length,
          });
        }
        const ok = await saveDraft();
        if (!ok) return;

        state.currentDate = date;
        resetItemForm();
        renderDay();
        setFeedback(isEditing ? "Activiteit bijgewerkt." : "Item opgeslagen en zichtbaar in je draaiboek.", false);
      }

      async function deleteItem() {
        if (!isOwnerMode()) {
          setFeedback("Alleen bruidspaar kan draaiboekitems verwijderen.", true);
          return;
        }
        setFeedback("");
        const itemId = String(state.editingItemId || "");
        if (!itemId) {
          setFeedback("Selecteer eerst een activiteit om te verwijderen.", true);
          return;
        }
        const index = state.items.findIndex((item) => item.id === itemId);
        if (index < 0) {
          setFeedback("Activiteit niet gevonden.", true);
          resetItemForm();
          renderDay();
          return;
        }

        const removed = state.items[index];
        state.items.splice(index, 1);
        const ok = await saveDraft();
        if (!ok) {
          state.items.splice(index, 0, removed);
          return;
        }

        resetItemForm();
        renderDay();
        setFeedback("Activiteit verwijderd.", false);
      }

      // ── Supplier chat ────────────────────────────────────────────────
      const chatState = { threadId: null, messages: [], ws: null };

      function formatChatTime(iso) {
        const d = new Date(iso);
        return (
          d.toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" }) +
          " · " +
          d.toLocaleDateString("nl-NL", { day: "2-digit", month: "2-digit" })
        );
      }

      function renderChatMessages() {
        const panel = document.getElementById("chat-panel");
        const container = document.getElementById("chat-msgs");
        if (!chatState.threadId) {
          panel.hidden = true;
          return;
        }
        panel.hidden = false;
        const profile = getProfile();
        if (!chatState.messages.length) {
          container.innerHTML = '<div class="chat-empty">Nog geen berichten. Stuur een eerste bericht!</div>';
          return;
        }
        // API returns newest-first; reverse so oldest is at top
        container.innerHTML = chatState.messages
          .slice()
          .reverse()
          .map((msg) => {
            const dir = msg.senderId === profile.userId ? "out" : "in";
            return `<div class="chat-msg ${dir}">
              <div class="chat-bubble">${escapeHtml(msg.content)}</div>
              <span class="chat-ts">${escapeHtml(formatChatTime(msg.createdAt))}</span>
            </div>`;
          })
          .join("");
        container.scrollTop = container.scrollHeight;
      }

      async function loadChatMessages() {
        if (!chatState.threadId) return;
        const resp = await fetch(`/v1/threads/${encodeURIComponent(chatState.threadId)}/messages`, {
          headers: headers(false),
        }).catch(() => null);
        if (!resp || !resp.ok) return;
        const payload = await resp.json().catch(() => ({}));
        chatState.messages = Array.isArray(payload.messages) ? payload.messages : [];
        renderChatMessages();
      }

      async function doSendChatMessage(content) {
        if (!chatState.threadId || !content.trim()) return false;
        const resp = await fetch(`/v1/threads/${encodeURIComponent(chatState.threadId)}/messages`, {
          method: "POST",
          headers: headers(true),
          body: JSON.stringify({ content: content.trim() }),
        }).catch(() => null);
        if (!resp || !resp.ok) return false;
        await loadChatMessages();
        return true;
      }

      function connectChatWebSocket() {
        if (!chatState.threadId) return;
        if (chatState.ws) {
          chatState.ws.close();
          chatState.ws = null;
        }
        const profile = getProfile();
        const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
        const ws = new WebSocket(`${proto}//${window.location.host}/ws?user_id=${encodeURIComponent(profile.userId)}`);
        chatState.ws = ws;
        ws.addEventListener("open", () => {
          ws.send(JSON.stringify({ action: "subscribe", threadId: chatState.threadId }));
        });
        ws.addEventListener("message", (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.event === "message.created" && msg.data) {
              // Avoid duplicates
              if (!chatState.messages.find((m) => m.id === msg.data.id)) {
                chatState.messages.unshift(msg.data);
                renderChatMessages();
              }
            }
          } catch { /* ignore parse errors */ }
        });
        ws.addEventListener("close", () => {
          setTimeout(() => {
            if (chatState.threadId) connectChatWebSocket();
          }, 3000);
        });
      }

      async function loadChatThread() {
        if (!state.wedding) return;
        const panel = document.getElementById("chat-panel");
        const container = document.getElementById("chat-msgs");
        const resp = await fetch(`/v1/weddings/${encodeURIComponent(state.wedding.id)}/threads`, {
          headers: headers(false),
        }).catch(() => null);
        if (!resp || !resp.ok) return;
        const payload = await resp.json().catch(() => ({}));
        const threads = Array.isArray(payload.threads) ? payload.threads : [];
        const thread = threads.find((t) => t.type === "supplier_thread") || threads[0] || null;
        if (!thread) {
          panel.hidden = false;
          container.innerHTML = '<div class="chat-empty">Het bruidspaar heeft nog geen gesprek gestart.</div>';
          return;
        }
        chatState.threadId = thread.id;
        await loadChatMessages();
        connectChatWebSocket();
      }

      function bindChatEvents() {
        document.getElementById("chat-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const input = document.getElementById("chat-input");
          const content = input.value.trim();
          if (!content) return;
          input.value = "";
          input.disabled = true;
          await doSendChatMessage(content);
          input.disabled = false;
          input.focus();
        });
      }
      // ── End supplier chat ─────────────────────────────────────────────

      function bindEvents() {
        if (isOwnerMode()) {
          document.getElementById("btn-save-item").addEventListener("click", () => {
            void saveItem();
          });

          document.getElementById("btn-cancel-edit").addEventListener("click", () => {
            resetItemForm();
            renderDay();
          });

          document.getElementById("btn-delete-item").addEventListener("click", () => {
            void deleteItem();
          });

          document.getElementById("btn-open-supplier-modal").addEventListener("click", () => {
            openSupplierModal();
          });

          document.getElementById("btn-close-supplier-modal").addEventListener("click", () => {
            closeSupplierModal(false);
          });

          document.getElementById("btn-save-supplier-modal").addEventListener("click", () => {
            closeSupplierModal(true);
          });
        }

        document.getElementById("btn-nav-logout").addEventListener("click", () => {
          void logoutToLogin();
        });

        document.getElementById("btn-prev-day").addEventListener("click", () => {
          state.currentDate = shiftDate(state.currentDate, -1);
          renderDay();
        });

        document.getElementById("btn-next-day").addEventListener("click", () => {
          state.currentDate = shiftDate(state.currentDate, 1);
          renderDay();
        });
      }

      function applyNavForRole(ownerMode) {
        document.querySelectorAll(".owner-only").forEach((el) => { el.style.display = ownerMode ? "" : "none"; });
        document.querySelectorAll(".supplier-only").forEach((el) => { el.style.display = ownerMode ? "none" : ""; });
      }

      async function bootstrap() {
        const hasWedding = await loadWeddingContext();
        if (!hasWedding) return;
        const ownerMode = isOwnerMode();
        applyNavForRole(ownerMode);
        document.body.classList.toggle("supplier-readonly", !ownerMode);
        const editorCard = document.getElementById("editor-card");
        if (editorCard) editorCard.hidden = !ownerMode;
        const readonlyFeedback = document.getElementById("readonly-feedback");
        if (readonlyFeedback) readonlyFeedback.hidden = ownerMode;
        bindEvents();
        await loadSuppliers();
        updateFormMode();
        resetItemForm();
        await loadDraft();
        await loadDocuments();
        renderDay();
        // Show chat panel for suppliers (owners use the main dashboard chat)
        if (!ownerMode) {
          bindChatEvents();
          await loadChatThread();
        }
      }

      void bootstrap();
    </script>
  </body>
</html>
